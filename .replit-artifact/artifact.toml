kind = "web"
previewPath = "/"
title = "Lense Daily"
version = "1.0.0"
id = "artifacts/lense-daily"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24161

[services.development]
run = "pnpm --filter @workspace/lense-daily run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/lense-daily", "run", "build" ]
publicDir = "artifacts/lense-daily/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24161"
BASE_PATH = "/"
